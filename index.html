<style>
:root {
  --bg: #07070d;
  --surface: #0f0f1a;
  --surface2: #161625;
  --border: #1e1e35;
  --accent: #6c63ff;

  --accent3: #43e97b;
  --accent4: #f7971e;
  --text: #e8e8f0;
  --muted: #6b6b8a;
  --ru: #ff6b6b;

* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body { min-height:100%; background:var(--bg); color:var(--text); font-family:'DM Mono', monospace; overflow-x:hidden; overflow-y:scroll; -webkit-text-size-adjust:100%; -webkit-overflow-scrolling:touch; }

/* SCROLLBAR */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

body::before {

/* LAYOUT */
#app { position:relative; z-index:1; display:flex; flex-direction:column; min-height:100vh; }

/* HEADER */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:.9rem 1.25rem; border-bottom:1px solid var(--border);
  background:rgba(7,7,13,.92); backdrop-filter:blur(20px);
  position:sticky; top:0; z-index:100; flex-wrap:wrap; gap:.5rem;
}
.logo {
  font-family:'Syne', sans-serif; font-weight:800; font-size:1.4rem;
  letter-spacing:-.02em; color:var(--text); flex-shrink:0;
}
.logo span { color:var(--accent); }
.header-right { display:flex; align-items:center; gap:.4rem; flex-wrap:nowrap; }
.lang-pills { display:flex; gap:.35rem; flex-wrap:wrap; flex:1; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; }

.lang-pill {

.lang-pill[data-lang="tr"] { --pill-color:var(--tr); }
.lang-pill[data-lang="sq"] { --pill-color:var(--sq); }
.lang-pill[data-lang="de"] { --pill-color:var(--de); }
.lang-pill[data-lang="th"] { --pill-color:var(--th); }
.lang-pill[data-lang="da"] { --pill-color:var(--da); }
.lang-pill[data-lang="ro"] { --pill-color:var(--ro); }
.lang-pill[data-lang="fr"] { --pill-color:var(--fr); }
.lang-pill[data-lang="pl"] { --pill-color:#e63946; }

.settings-btn {
  background:var(--surface2); border:1px solid var(--border); border-radius:8px;
  padding:.35rem .6rem; cursor:pointer; font-size:1rem; color:var(--muted);
  transition:all .2s; display:flex; align-items:center; gap:.3rem;
  -webkit-tap-highlight-color:transparent;
}
.settings-btn:hover { border-color:var(--accent); color:var(--accent); }
.api-dot-inline { width:7px; height:7px; border-radius:50%; background:var(--accent2); display:inline-block; }
.api-dot-inline.ok { background:var(--accent3); }

/* NAV */
nav {
  display:flex; gap:.2rem; overflow-x:auto; padding:.6rem 1rem;
  background:var(--nav-bg, rgba(7,7,13,.6)); border-bottom:1px solid var(--border);

  align-items:center;
}

.nav-btn {
  display:flex; align-items:center; gap:.4rem; padding:.5rem .9rem;
  border-radius:8px; border:1px solid transparent; background:transparent;
  color:var(--nav-text, var(--muted)); font-family:'Syne',sans-serif; font-size:.75rem; font-weight:600;

  -webkit-tap-highlight-color:transparent; flex-shrink:0;
}
.nav-btn:hover { color:var(--text); border-color:var(--border); background:var(--surface2); }
.nav-btn.active { background:var(--surface); border-color:var(--accent); color:var(--accent); }
.nav-icon { font-size:.9rem; }

/* Accordion Levels UI */
.nav-level-wrapper {
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(15, 15, 26, 0.4);
  margin-bottom: 1rem;
  overflow: hidden;
}
.nav-level-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.85rem 1.25rem;
  background: var(--surface2);
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}
.nav-level-header:hover {
  background: rgba(108, 99, 255, 0.05);
}
.nav-level-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.03em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.nav-level-chevron {
  font-size: 0.7rem;
  color: var(--muted);
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.nav-level-wrapper.open .nav-level-chevron {
  transform: rotate(90deg);
  color: var(--accent);
}
.nav-level-content {
  display: none;
  padding: 0.75rem;
  gap: 0.5rem;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  border-top: 1px solid var(--border);
  background: rgba(7, 7, 13, 0.2);
}
.nav-level-wrapper.open .nav-level-content {
  display: grid;
}

/* Light mode nav fix */
:root.light nav { background:var(--nav-bg, rgba(220,220,235,.95)); }
:root.light .nav-btn { color:var(--nav-text, #444466); }
:root.light .nav-btn:hover { color:var(--text); background:rgba(0,0,0,.06); }
:root.light .nav-btn.active { background:#fff; color:var(--accent); border-color:var(--accent); }

/* MAIN */
main { padding:1.25rem; max-width:900px; width:100%; margin:0 auto; flex:1; }

/* SECTIONS */
.section { display:none; animation:fadeIn .3s ease; }
.section.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* CARDS */
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  padding:1.5rem; margin-bottom:1rem;
}
.card-title {
  font-family:'Syne',sans-serif; font-weight:700; font-size:1rem;
  color:var(--text); margin-bottom:1rem; display:flex; align-items:center; gap:.5rem;
}
